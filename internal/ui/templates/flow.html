<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mishri | Live Agent Graph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --cdark: #0b0e14;
            --cgray: #161b22;
            --cborder: rgba(255, 255, 255, 0.1);
            --glass: rgba(13, 17, 23, 0.85);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--cdark);
            color: #d1d5db;
            overflow: hidden;
            margin: 0;
        }

        .cyber-grid {
            background-color: var(--cdark);
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .unified-nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--cborder);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo-icon {
            color: var(--neon);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .nav-logo-text {
            color: white;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--neon);
            background: rgba(0, 255, 65, 0.05);
            border-color: rgba(0, 255, 65, 0.2);
        }

        .nav-link.active {
            color: var(--neon);
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.3);
        }

        .node circle {
            cursor: pointer;
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 2px;
            transition: all 0.3s;
            fill: #161b22;
        }

        .node text {
            font-size: 10px;
            fill: #e5e7eb;
            pointer-events: none;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        .link {
            fill: none;
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1.5px;
            transition: stroke 0.3s;
        }

        .agent-active {
            stroke: #3b82f6 !important;
            animation: glow-pulse-active 2s infinite ease-in-out;
        }

        .agent-completed,
        .agent-success {
            stroke: #10b981 !important;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }

        .agent-failed {
            stroke: #ef4444 !important;
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.4));
        }

        .agent-pending {
            stroke: #4b5563 !important;
            stroke-dasharray: 4;
        }

        .agent-escalated {
            stroke: #a855f7 !important;
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.4));
        }

        .detail-panel {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(24px);
            border-left: 1px solid var(--cborder);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4);
        }

        /* --- Components --- */
        .cyber-modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .cyber-modal {
            background: #0d1117;
            border: 1px solid var(--cborder);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 1px var(--neon);
            max-width: 400px;
            width: 90%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .cyber-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid transparent;
            backdrop-filter: blur(12px);
        }

        .toast-success {
            background: rgba(5, 46, 22, 0.9);
            border-color: #22c55e;
            color: #86efac;
        }

        .toast-error {
            background: rgba(69, 10, 10, 0.9);
            border-color: #ef4444;
            color: #fca5a5;
        }

        .event-card {
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--cborder);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }

        .event-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes glow-pulse-active {
            0% { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.4)); stroke-width: 2px; }
            50% { filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.6)); stroke-width: 3px; }
            100% { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.4)); stroke-width: 2px; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body class="cyber-grid h-screen w-screen overflow-hidden" x-data="flowApp()">

    <!-- Unified Navigation -->
    <nav class="unified-nav">
        <a href="/" class="nav-logo">
            <span class="nav-logo-icon">⬡</span>
            <span class="nav-logo-text text-xl">Mishri</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Config</span>
            </a>
            <a href="/chat" class="nav-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.855-1.246L3 20l1.13-3.135C2.106 15.176 1 13.195 1 11c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                <span>Chat</span>
            </a>
            <a href="/flow" class="nav-link active flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span>Flow</span>
            </a>
            <div class="h-4 w-px bg-gray-700 mx-2"></div>
            <button @click="resetView" class="nav-link">Center View</button>
            <button @click="confirmReset" class="nav-link text-red-500 hover:bg-red-500/10">✕ Clear</button>
        </div>
    </nav>

    <!-- Custom Toast -->
    <template x-teleport="body">
        <div x-show="notification.show" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4" 
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200" 
             x-transition:leave-end="opacity-0 translate-y-4"
             :class="notification.type === 'success' ? 'toast-success' : 'toast-error'"
             class="cyber-toast">
            <span x-show="notification.type === 'success'">✅</span>
            <span x-show="notification.type === 'error'">❌</span>
            <span x-text="notification.message"></span>
        </div>
    </template>

    <!-- Cyber Modal -->
    <template x-teleport="body">
        <div x-show="modal.show" 
             class="fixed inset-0 cyber-modal-overlay flex items-center justify-center p-4"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-end="opacity-0"
             style="display:none;">
            <div class="cyber-modal p-6 space-y-4" @click.away="modal.show = false">
                <div class="flex items-center gap-3 text-red-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <h3 class="font-bold text-lg" x-text="modal.title"></h3>
                </div>
                <p class="text-sm text-gray-400" x-text="modal.message"></p>
                <div class="flex justify-end gap-3 mt-6">
                    <button @click="modal.show = false" class="nav-link">Cancel</button>
                    <button @click="modal.onConfirm()" class="px-4 py-2 bg-red-600/20 text-red-500 border border-red-500/50 rounded-lg text-sm font-bold hover:bg-red-600/40 transition">
                        Confirm Action
                    </button>
                </div>
            </div>
        </div>
    </template>

    <div class="h-full w-full flex relative pt-[60px]">
        <!-- Legend Overlay -->
        <div class="absolute top-20 right-6 z-10">
            <div class="flex items-center gap-3 px-3 py-1.5 bg-black/40 backdrop-blur-md border border-white/5 rounded-full text-[10px] text-gray-400">
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span> Manager
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span> Worker
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Active
                </div>
                <div class="w-px h-3 bg-white/10 mx-1"></div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full" :class="connected ? 'bg-green-500' : 'bg-red-500'"></span>
                    <span x-text="connected ? 'Live' : 'Offline'"></span>
                </div>
            </div>
        </div>

        <!-- Main Graph Area -->
        <main class="flex-1 relative" id="graph-container">
            <svg id="graph-svg" class="w-full h-full block"></svg>
            
            <!-- Empty State -->
            <div x-show="nodes.length === 0"
                class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 pointer-events-none">
                <div class="text-4xl mb-4 opacity-70">🛰️</div>
                <p class="text-sm font-medium text-gray-400">Waiting for agent activity...</p>
                <p class="text-xs opacity-50 mt-1">Graph nodes will appear here in real-time.</p>
            </div>
        </main>

        <!-- Details Sidebar -->
        <aside class="fixed top-[60px] right-0 h-[calc(100vh-60px)] w-96 detail-panel z-20 flex flex-col transform transition-transform duration-300"
               :class="selectedNode ? 'translate-x-0' : 'translate-x-full'">
            <template x-if="selectedNode">
                <div class="flex flex-col h-full">
                    <!-- Sidebar Header -->
                    <div class="p-6 border-b border-white/5 bg-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-bold tracking-widest text-blue-400 uppercase" x-text="selectedNode.type"></span>
                            <button @click="selectedNode = null" class="text-gray-500 hover:text-white transition text-xl leading-none">&times;</button>
                        </div>
                        <h2 class="text-xl font-bold text-white" x-text="selectedNode.type === 'root' ? 'MasterBrain' : 'Agent ' + selectedNode.agent_id"></h2>
                        <div class="mt-3 flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold border"
                                :class="selectedNode.status === 'active' ? 'bg-amber-500/10 text-amber-500 border-amber-500/30' : 'bg-green-500/10 text-green-500 border-green-500/30'"
                                x-text="selectedNode.status"></span>
                        </div>
                    </div>

                    <!-- Execution Log -->
                    <div class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-4">
                        <template x-for="ev in getNodeEvents(selectedNode.id)">
                            <div class="event-card">
                                <div class="flex justify-between text-[9px] font-bold text-gray-500 uppercase mb-2">
                                    <span x-text="ev.type"></span>
                                    <span x-text="formatTime(ev.timestamp)"></span>
                                </div>

                                <template x-if="ev.type === 'agent_start'">
                                    <div class="space-y-1">
                                        <div class="text-amber-400 font-bold text-[10px] uppercase">Goal Initialized</div>
                                        <div class="text-gray-300 text-xs bg-white/5 p-2 rounded border border-white/5" x-text="ev.data.goal"></div>
                                    </div>
                                </template>

                                <template x-if="ev.type === 'reasoning'">
                                    <div class="text-gray-400 text-sm italic whitespace-pre-wrap leading-relaxed" x-text="ev.data.content"></div>
                                </template>

                                <template x-if="ev.type === 'llm'">
                                    <div class="space-y-2">
                                        <div class="text-purple-400 font-bold text-[10px] uppercase flex items-center gap-1">
                                            <span>🧠</span> Strategic Thinking
                                        </div>
                                        <div class="space-y-1">
                                            <div class="text-[10px] text-gray-500 italic">Response:</div>
                                            <div class="text-gray-300 text-xs bg-purple-500/5 p-2 rounded border border-purple-500/10 whitespace-pre-wrap" 
                                                 x-text="ev.data.response.length > 500 ? ev.data.response.substring(0, 500) + '...' : ev.data.response"></div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="ev.type === 'plan'">
                                    <div class="space-y-2">
                                        <div class="text-cyan-400 font-bold text-[10px] uppercase flex items-center gap-1">
                                            <span>📋</span> Proposed Team
                                        </div>
                                        <div class="overflow-x-auto">
                                            <table class="w-full text-[10px] text-left border-collapse">
                                                <thead>
                                                    <tr class="text-gray-500 border-b border-white/5">
                                                        <th class="py-1 pr-2">ID</th>
                                                        <th class="py-1 pr-2">Type</th>
                                                        <th class="py-1">Goal</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="agent in ev.data.agents">
                                                        <tr class="border-b border-white/5">
                                                            <td class="py-1 pr-2 text-cyan-500" x-text="agent.id"></td>
                                                            <td class="py-1 pr-2 text-gray-400" x-text="agent.type"></td>
                                                            <td class="py-1 text-gray-500 truncate max-w-[150px]" :title="agent.goal" x-text="agent.goal"></td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="ev.type === 'tool_call'">
                                    <div class="space-y-1">
                                        <div class="text-blue-400 font-medium flex items-center gap-1 text-xs">
                                            <span>🛠️</span> <code x-text="ev.data.tool"></code>
                                        </div>
                                        <template x-if="ev.data.args">
                                            <pre class="text-[10px] bg-black/40 p-2 rounded text-gray-500 overflow-x-auto border border-white/5" x-text="ev.data.args.length > 500 ? ev.data.args.substring(0, 500) + '...' : ev.data.args"></pre>
                                        </template>
                                    </div>
                                </template>

                                <template x-if="ev.type === 'tool_result'">
                                    <div class="space-y-1">
                                        <div class="text-green-400/80 font-medium flex items-center gap-1 text-xs">
                                            <span>✅</span> Result
                                        </div>
                                        <pre class="text-[10px] bg-black/40 p-2 rounded text-gray-400 overflow-x-auto border border-white/5" x-text="ev.data.result.length > 1000 ? ev.data.result.substring(0, 1000) + '...' : ev.data.result"></pre>
                                    </div>
                                </template>

                                <template x-if="ev.type === 'policy_check'">
                                    <div class="flex items-center gap-2 text-[10px]">
                                        <span class="text-gray-500 uppercase">Policy:</span>
                                        <code class="text-white bg-white/10 px-1 rounded" x-text="ev.data.tool"></code>
                                        <span :class="ev.data.result === 'allow' ? 'text-green-500' : 'text-red-500'" class="font-bold uppercase" x-text="ev.data.result"></span>
                                    </div>
                                </template>

                                <template x-if="ev.type === 'agent_end'">
                                    <div class="text-xs" :class="ev.data.status === 'success' || ev.data.status === 'completed' ? 'text-green-500' : 'text-red-500'">
                                        Status: <span class="font-bold uppercase" x-text="ev.data.status"></span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </aside>
    </div>

    <script>
        function flowApp() {
            return {
                events: [],
                connected: false,
                ws: null,
                nodes: [],
                links: [],
                selectedNode: null,
                notification: { show: false, message: '', type: 'success' },
                modal: { show: false, title: '', message: '', onConfirm: () => {} },
                svg: null,
                g: null,
                simulation: null,
                zoom: null,

                init() {
                    this.initD3();
                    this.connect();
                    window.addEventListener('resize', () => this.updateDimensions());
                },

                initD3() {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    this.svg = d3.select("#graph-svg");
                    this.g = this.svg.append("g");

                    this.zoom = d3.zoom()
                        .scaleExtent([0.1, 4])
                        .on("zoom", (event) => this.g.attr("transform", event.transform));

                    this.svg.call(this.zoom);

                    this.simulation = d3.forceSimulation()
                        .force("link", d3.forceLink().id(d => d.id).distance(120))
                        .force("charge", d3.forceManyBody().strength(-400))
                        .force("center", d3.forceCenter(width / 2, (height + 60) / 2))
                        .on("tick", () => this.ticked());
                },

                updateDimensions() {
                    this.simulation.force("center", d3.forceCenter(window.innerWidth / 2, (window.innerHeight + 60) / 2));
                    this.simulation.alpha(0.3).restart();
                },

                connect() {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    this.ws = new WebSocket(`${protocol}//${window.location.host}/ws/events`);

                    this.ws.onopen = () => this.connected = true;
                    this.ws.onmessage = (msg) => {
                        try {
                            const event = JSON.parse(msg.data);
                            this.processEvent(event);
                        } catch (e) { console.error('WS Error:', e); }
                    };
                    this.ws.onclose = () => {
                        this.connected = false;
                        setTimeout(() => this.connect(), 3000);
                    };
                },

                processEvent(ev) {
                    this.events.push(ev);
                    if (this.events.length > 500) this.events.shift();

                    if (ev.type === 'plan' || ev.type === 'agent_start') {
                        this.handleAgentActivity(ev);
                    } else if (ev.type === 'agent_end') {
                        this.updateAgentStatus(ev);
                    } else if (ev.type === 'reasoning' || ev.type === 'tool_call' || ev.type === 'llm' || ev.type === 'policy_check') {
                        this.markAgentActive(ev);
                    }
                    this.updateGraph();
                },

                handleAgentActivity(ev) {
                    const chatID = ev.chat_id;
                    const parentID = ev.parent_chat_id;

                    const rootChatID = parentID || chatID;
                    if (!this.nodes.find(n => n.id === rootChatID)) {
                        this.nodes.push({ id: rootChatID, type: 'root', status: 'active', label: 'Master' });
                    }

                    if (ev.type === 'agent_start') {
                        const agentID = ev.data.agent_id;
                        const taskID = ev.task_id || 'default';
                        const nodeID = `${chatID}::${taskID}::${agentID}`;

                        if (!this.nodes.find(n => n.id === nodeID)) {
                            let parentNodeID = ev.chat_id;
                            if (ev.parent_chat_id) {
                                const pTaskID = ev.parent_task_id || ev.task_id || 'default';
                                parentNodeID = `${ev.parent_chat_id}::${pTaskID}::${ev.parent_agent_id}`;
                                if (!this.nodes.find(n => n.id === parentNodeID)) parentNodeID = ev.parent_chat_id;
                            }

                            this.nodes.push({
                                id: nodeID,
                                chat_id: chatID,
                                type: 'agent',
                                agent_id: agentID,
                                agent_type: ev.data.agent_type,
                                status: 'active',
                                parentId: parentNodeID
                            });

                            if (!this.links.find(l => l.source === parentNodeID && l.target === nodeID)) {
                                this.links.push({ source: parentNodeID, target: nodeID });
                            }
                        }
                    } else if (ev.type === 'plan') {
                        const taskID = ev.task_id || 'default';
                        ev.data.agents.forEach(a => {
                            const nodeID = `${chatID}::${taskID}::${a.id}`;
                            if (!this.nodes.find(n => n.id === nodeID)) {
                                let parentNodeID = ev.chat_id;
                                if (ev.parent_chat_id) {
                                    const pTaskID = ev.parent_task_id || ev.task_id || 'default';
                                    parentNodeID = `${ev.parent_chat_id}::${pTaskID}::${ev.parent_agent_id}`;
                                    if (!this.nodes.find(n => n.id === parentNodeID)) parentNodeID = ev.parent_chat_id;
                                }
                                this.nodes.push({
                                    id: nodeID,
                                    chat_id: chatID,
                                    type: 'agent',
                                    agent_id: a.id,
                                    agent_type: a.type,
                                    status: 'pending',
                                    parentId: parentNodeID
                                });
                                if (!this.links.find(l => l.source === parentNodeID && l.target === nodeID)) {
                                    this.links.push({ source: parentNodeID, target: nodeID });
                                }
                            }
                        });
                    }
                },

                updateAgentStatus(ev) {
                    const taskID = ev.task_id || 'default';
                    const nodeID = `${ev.chat_id}::${taskID}::${ev.data.agent_id}`;
                    const node = this.nodes.find(n => n.id === nodeID);
                    if (node) node.status = ev.data.status;
                },

                markAgentActive(ev) {
                    const chatID = ev.chat_id;
                    const agentID = ev.data ? ev.data.agent_id : null;
                    const taskID = ev.task_id || 'default';
                    if (agentID !== null) {
                        const nodeID = `${chatID}::${taskID}::${agentID}`;
                        const node = this.nodes.find(n => n.id === nodeID);
                        if (node && node.status !== 'completed') node.status = 'active';
                    } else {
                        const node = this.nodes.find(n => n.id === chatID);
                        if (node) node.status = 'active';
                    }
                },

                updateGraph() {
                    const nodeData = [...this.nodes];
                    const linkData = this.links.map(l => ({ ...l }));

                    const link = this.g.selectAll(".link")
                        .data(linkData, d => `${d.source.id || d.source}-${d.target.id || d.target}`)
                        .join("path")
                        .attr("class", "link");

                    const node = this.g.selectAll(".node")
                        .data(nodeData, d => d.id)
                        .join("g")
                        .attr("class", "node")
                        .on("click", (e, d) => { this.selectedNode = d; })
                        .call(d3.drag()
                            .on("start", (e, d) => this.dragstarted(e, d))
                            .on("drag", (e, d) => this.dragged(e, d))
                            .on("end", (e, d) => this.dragended(e, d)));

                    node.selectAll("circle")
                        .data(d => [d])
                        .join("circle")
                        .attr("r", d => d.type === 'root' ? 12 : 8)
                        .attr("class", d => `node-circle agent-${d.status}`);

                    node.selectAll("text")
                        .data(d => [d])
                        .join("text")
                        .attr("dx", 15)
                        .attr("dy", 4)
                        .text(d => d.type === 'root' ? 'Master' : `${d.agent_type} (A${d.agent_id})`);

                    this.simulation.nodes(nodeData);
                    this.simulation.force("link").links(linkData);
                    this.simulation.alpha(0.3).restart();
                },

                ticked() {
                    this.g.selectAll(".link").attr("d", d => `M${d.source.x},${d.source.y}L${d.target.x},${d.target.y}`);
                    this.g.selectAll(".node").attr("transform", d => `translate(${d.x},${d.y})`);
                },

                dragstarted(event, d) {
                    if (!event.active) this.simulation.alphaTarget(0.3).restart();
                    d.fx = d.x; d.fy = d.y;
                },
                dragged(event, d) { d.fx = event.x; d.fy = event.y; },
                dragended(event, d) {
                    if (!event.active) this.simulation.alphaTarget(0);
                    d.fx = null; d.fy = null;
                },

                resetView() {
                    this.svg.transition().duration(750).call(
                        this.zoom.transform,
                        d3.zoomIdentity.translate(window.innerWidth / 2, (window.innerHeight + 60) / 2).scale(1)
                    );
                },

                confirmReset() {
                    this.modal = {
                        show: true,
                        title: 'Reset Live Graph',
                        message: 'This will clear all currently visible nodes and links from the graph. It does NOT affect the agent\'s memory.',
                        onConfirm: () => {
                            this.modal.show = false;
                            this.resetGraph();
                        }
                    };
                },

                resetGraph() {
                    this.nodes = []; this.links = []; this.events = []; this.selectedNode = null;
                    this.updateGraph();
                    this.flash('Live graph reset.', 'success');
                },

                flash(msg, type) {
                    this.notification = { show: true, message: msg, type };
                    setTimeout(() => this.notification.show = false, 3000);
                },

                getNodeEvents(id) {
                    return this.events.filter(ev => {
                        if (id.includes('::')) {
                            const parts = id.split('::'); // [parentChatID, taskID, agentID]
                            
                            // Check if this is a direct worker event
                            const isDirectWorkerEvent = ev.chat_id === parts[0] && 
                                   (ev.data && ev.data.agent_id == parts[2]) &&
                                   (ev.task_id === parts[1] || !ev.task_id || ev.task_id === 'default');
                            
                            if (isDirectWorkerEvent) return true;

                            // Check if this is an internal event from a sub-manager
                            // Sub-managers use sub_{parentChatID}_{agentID} as their chat_id
                            const subChatID = `sub_${parts[0]}_${parts[2]}`;
                            if (ev.chat_id === subChatID) return true;

                            return false;
                        }
                        // Root node events
                        return ev.chat_id === id && (!ev.data || ev.data.agent_id === undefined || ev.data.agent_id === 0);
                    }).reverse().slice(0, 50);
                },

                formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString() : ''; }
            }
        }
    </script>
</body>

</html>
