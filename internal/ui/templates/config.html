<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mishri | Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#00ff41',
                        cdark: '#0b0e14',
                        cgray: '#161b22',
                        cborder: '#30363d',
                        premium: {
                            glow: 'rgba(0, 255, 65, 0.15)',
                            glass: 'rgba(22, 27, 34, 0.7)',
                            border: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    backgroundImage: {
                        'mesh': 'radial-gradient(at 0% 0%, rgba(0, 255, 65, 0.05) 0%, transparent 50%), radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%)',
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --neon: #00ff41;
            --cdark: #0b0e14;
            --cgray: #161b22;
            --cborder: rgba(255, 255, 255, 0.1);
            --glass: rgba(13, 17, 23, 0.8);
        }

        body {
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-color: var(--cdark);
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
        }

        .cyber-grid {
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 65, 0.05) 0%, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }

        .unified-nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--cborder);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo-icon {
            color: var(--neon);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .nav-logo-text {
            color: white;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--neon);
            background: rgba(0, 255, 65, 0.05);
            border-color: rgba(0, 255, 65, 0.2);
        }

        .nav-link.active {
            color: var(--neon);
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.3);
        }

        .cyber-card {
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid var(--cborder);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(8px);
            transition: border-color 0.2s;
        }

        .cyber-card:hover {
            border-color: rgba(0, 255, 65, 0.3);
        }

        .cyber-input {
            width: 100%;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--cborder);
            border-radius: 8px;
            padding: 0.625rem 0.875rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .cyber-input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 0 2px rgba(0, 255, 65, 0.15);
        }

        .btn-premium {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #0d1117;
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.2);
        }

        .btn-premium:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 255, 65, 0.3);
            filter: brightness(1.1);
        }

        /* --- New Utility Classes --- */
        .cyber-section-header {
            font-size: 1.125rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.625rem;
            margin-bottom: 1.25rem;
        }

        .cyber-section-header svg {
            width: 1.25rem;
            height: 1.25rem;
            color: var(--neon);
        }

        .cyber-field-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cyber-grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        .cyber-provider-card {
            padding: 1.25rem;
            position: relative;
            background: rgba(13, 17, 23, 0.3);
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .cyber-provider-card:hover {
            background: rgba(13, 17, 23, 0.5);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .cyber-status-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .cyber-status-toggle input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--neon);
            cursor: pointer;
        }

        .cyber-hint {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.375rem;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--cdark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: background 0.2s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon);
        }
        .btn-premium:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .cyber-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- Components --- */
        .cyber-modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .cyber-modal {
            background: #0d1117;
            border: 1px solid var(--cborder);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 1px var(--neon);
            max-width: 400px;
            width: 90%;
            border-radius: 12px;
            overflow: hidden;
        }

        .cyber-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid transparent;
            backdrop-filter: blur(12px);
        }

        .toast-success {
            background: rgba(5, 46, 22, 0.9);
            border-color: #22c55e;
            color: #86efac;
        }

        .toast-error {
            background: rgba(69, 10, 10, 0.9);
            border-color: #ef4444;
            color: #fca5a5;
        }
    </style>
</head>

<body class="cyber-grid" x-data="configForm()">

    <!-- Unified Navigation -->
    <nav class="unified-nav">
        <a href="/" class="nav-logo">
            <span class="nav-logo-icon">⬡</span>
            <span class="nav-logo-text text-xl">Mishri</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link" title="Landing Page Home">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
            </a>
            <a href="/config" class="nav-link active" title="Configuration Settings">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                    </path>
                </svg>
            </a>
            <a href="/chat" class="nav-link flex items-center gap-2" title="Live Agent Chat">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.855-1.246L3 20l1.13-3.135C2.106 15.176 1 13.195 1 11c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                    </path>
                </svg>
            </a>
            <a href="/flow" class="nav-link flex items-center gap-2" title="Real-time Execution Flow">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
            </a>
            <div class="h-4 w-px bg-gray-700 mx-1"></div>
            <button @click="save" :disabled="saving" class="nav-link text-neon hover:bg-neon/10" title="Save Configuration">
                <svg x-show="!saving" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
                </svg>
                <svg x-show="saving" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>
    </nav>    <div class="max-w-5xl mx-auto py-8 px-4">

        <!-- Custom Toast -->
        <template x-teleport="body">
            <div x-show="notification.show" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4" 
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200" 
                 x-transition:leave-end="opacity-0 translate-y-4"
                 :class="notification.type === 'success' ? 'toast-success' : 'toast-error'"
                 class="cyber-toast">
                <span x-show="notification.type === 'success'">✅</span>
                <span x-show="notification.type === 'error'">❌</span>
                <span x-text="notification.message"></span>
            </div>
        </template>

        <!-- Cyber Modal -->
        <template x-teleport="body">
            <div x-show="modal.show" 
                 class="fixed inset-0 cyber-modal-overlay flex items-center justify-center p-4"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-end="opacity-0"
                 style="display:none;">
                <div class="cyber-modal p-6 space-y-4" @click.away="modal.show = false">
                    <div class="flex items-center gap-3 text-red-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <h3 class="font-bold text-lg" x-text="modal.title"></h3>
                    </div>
                    <p class="text-sm text-gray-400" x-text="modal.message"></p>
                    <div class="flex justify-end gap-3 mt-6">
                        <button @click="modal.show = false" class="nav-link">Cancel</button>
                        <button @click="modal.onConfirm()" class="px-4 py-2 bg-red-600/20 text-red-500 border border-red-500/50 rounded-lg text-sm font-bold hover:bg-red-600/40 transition">
                            Confirm Action
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <div class="space-y-6">
            <!-- JSON Configuration Editor -->
            <div class="bg-cgray/50 border border-white/5 rounded-2xl overflow-hidden shadow-2xl">
                <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-white/5">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-neon/10 rounded-lg">
                            <svg class="w-5 h-5 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                            </svg>
                        </div>
                        <div>
                            <h2 class="text-white font-bold leading-none">Settings Configuration</h2>
                            <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-wider font-medium">Direct JSON Raw Access</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span x-show="jsonError" class="text-[10px] font-bold text-red-500 px-2 py-1 bg-red-500/10 rounded border border-red-500/20" x-text="jsonError"></span>
                        <div class="px-3 py-1 bg-black/40 rounded-full border border-white/5 flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-neon animate-pulse"></span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">Interactive Editor</span>
                        </div>
                    </div>
                </div>
                
                <div class="relative group">
                    <textarea 
                        x-model="jsonContent" 
                        spellcheck="false"
                        @input="validateJson"
                        class="w-full h-[600px] bg-black/40 p-8 text-cyan-400/90 font-mono text-sm leading-relaxed outline-none transition-all placeholder-gray-700 resize-none focus:bg-black/60"
                        placeholder="{ ... your config here ... }"
                    ></textarea>
                    
                    <div class="absolute bottom-4 right-6 opacity-40 group-hover:opacity-100 transition-opacity">
                        <span class="text-[10px] font-bold text-gray-500 font-mono">UTF-8 JSON</span>
                    </div>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="bg-red-950/10 border border-red-500/20 rounded-2xl p-6 backdrop-blur-sm">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-red-500/10 rounded-lg">
                        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <h2 class="text-lg font-bold text-red-400">System Destruction Zone</h2>
                </div>
                <div class="ml-11">
                    <p class="text-sm text-red-300/60 mb-4 font-medium italic">Permanently eliminate conversation history, agent plans, and cost analytics. This action is atomic and irreversible.</p>
                    <button @click="clearHistory"
                        class="px-6 py-2.5 bg-red-600/10 hover:bg-red-600/20 text-red-400 border border-red-500/40 rounded-xl text-sm font-bold transition-all hover:scale-[1.02] active:scale-95 shadow-lg shadow-red-900/10">
                        ⚡ Wipe System History
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const serverConfig = JSON.parse('{{.| json}}') || null;

        function configForm() {
            return {
                config: serverConfig,
                jsonContent: JSON.stringify(serverConfig, null, 4),
                jsonError: null,
                saving: false,
                notification: { show: false, message: '', type: 'success' },
                modal: { show: false, title: '', message: '', onConfirm: () => {} },

                validateJson() {
                    try {
                        JSON.parse(this.jsonContent);
                        this.jsonError = null;
                        return true;
                    } catch (e) {
                        this.jsonError = "Invalid JSON Syntax";
                        return false;
                    }
                },

                async save() {
                    if (!this.validateJson()) {
                        this.flash('Cannot save: Invalid JSON syntax ❌', 'error');
                        return;
                    }

                    this.saving = true;
                    try {
                        const parsedConfig = JSON.parse(this.jsonContent);
                        const res = await fetch('/api/config', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(parsedConfig)
                        });
                        
                        if (!res.ok) {
                            const errorText = await res.text();
                            throw new Error(errorText || 'Server rejected the configuration');
                        }
                        
                        this.config = parsedConfig;
                        this.flash('Configuration uploaded successfully! ⚡', 'success');
                    } catch (e) {
                        this.flash(e.message, 'error');
                    } finally {
                        this.saving = false;
                    }
                },

                flash(msg, type) {
                    this.notification = { show: true, message: msg, type };
                    setTimeout(() => this.notification.show = false, 4000);
                },

                async clearHistory() {
                    this.modal = {
                        show: true,
                        title: 'Initiate System Wipe?',
                        message: 'This will permanently destroy all conversation history and agent logs. This procedure cannot be aborted once initiated.',
                        onConfirm: async () => {
                            this.modal.show = false;
                            try {
                                const res = await fetch('/api/history', { method: 'DELETE' });
                                if (!res.ok) throw new Error(await res.text());
                                this.flash('System wipe complete. 🗑️', 'success');
                            } catch (e) {
                                this.flash('Wipe failed: ' + e.message, 'error');
                            }
                        }
                    };
                }
            };
        }
    </script>
</body>

</html>
