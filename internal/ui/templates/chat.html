<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mishri | Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- markdown-it for rendering agent responses as Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
    <style>
        :root {
            --neon: #00ff41;
            --cdark: #0b0e14;
            --cgray: #161b22;
            --cborder: rgba(255, 255, 255, 0.1);
            --glass: rgba(13, 17, 23, 0.8);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--cdark);
            color: #e2e8f0;
            overflow: hidden;
        }

        .cyber-grid {
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 255, 65, 0.05) 0%, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }

        .unified-nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--cborder);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo-icon {
            color: var(--neon);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .nav-logo-text {
            color: white;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--neon);
            background: rgba(0, 255, 65, 0.05);
            border-color: rgba(0, 255, 65, 0.2);
        }

        .nav-link.active {
            color: var(--neon);
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.3);
        }

        #messages {
            scroll-behavior: smooth;
        }

        /* --- Components --- */
        .cyber-modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .cyber-modal {
            background: #0d1117;
            border: 1px solid var(--cborder);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 1px var(--neon);
            max-width: 400px;
            width: 90%;
            border-radius: 12px;
            overflow: hidden;
        }

        .cyber-toast {
            position: fixed;
            bottom: 6rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid transparent;
            backdrop-filter: blur(12px);
        }

        .toast-success {
            background: rgba(5, 46, 22, 0.9);
            border-color: #22c55e;
            color: #86efac;
        }

        .toast-error {
            background: rgba(69, 10, 10, 0.9);
            border-color: #ef4444;
            color: #fca5a5;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--cdark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: background 0.2s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon);
        }

        /* --- Animations --- */
        @keyframes pulse-neon {
            0%, 100% { opacity: 1; text-shadow: 0 0 8px var(--neon); }
            50% { opacity: 0.4; text-shadow: none; }
        }
        .animate-pulse-neon {
            animation: pulse-neon 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .msg-container {
            max-width: 85%;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            position: relative;
        }

        .msg-user {
            background: rgba(0, 255, 65, 0.08);
            border: 1px solid rgba(0, 255, 65, 0.2);
            align-self: flex-end;
            border-radius: 12px 12px 0 12px;
        }

        .msg-assist {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--cborder);
            align-self: flex-start;
            border-radius: 12px 12px 12px 0;
            backdrop-filter: blur(8px);
        }

        .msg-think {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            font-style: italic;
            border-radius: 8px;
            font-size: 0.875rem;
        }

        .msg-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.25rem;
        }

        .msg-role {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Markdown rendered output */
        .prose p {
            margin: 0.5rem 0;
        }

        .prose pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .prose code {
            color: var(--neon);
            font-size: 0.875rem;
        }

        .prose pre code {
            color: #e2e8f0;
        }

        .prose a {
            color: #60a5fa;
            text-decoration: underline;
        }

        .btn-send {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #0d1117;
            font-weight: 700;
            border-radius: 8px;
            padding: 0.625rem 1.25rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 255, 65, 0.3);
        }

        .cyber-input {
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--cborder);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .cyber-input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 0 2px rgba(0, 255, 65, 0.15);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: var(--neon);
            vertical-align: text-bottom;
            animation: blink 1s step-start infinite;
        }
    </style>
</head>

<body class="cyber-grid flex flex-col h-screen" x-data="chatApp()">

    <!-- Unified Navigation -->
    <nav class="unified-nav">
        <a href="/" class="nav-logo">
            <span class="nav-logo-icon">⬡</span>
            <span class="nav-logo-text text-xl">Mishri</span>
        </a>
        <div class="flex items-center gap-4">
            <div class="nav-links">
                <a href="/" class="nav-link" title="Landing Page Home">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                </a>
                <a href="/config" class="nav-link" title="Configuration Settings">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </a>
                <a href="/chat" class="nav-link active" title="Live Agent Chat">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.855-1.246L3 20l1.13-3.135C2.106 15.176 1 13.195 1 11c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                        </path>
                    </svg>
                </a>
                <a href="/flow" class="nav-link" title="Real-time Execution Flow">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                </a>
            </div>
            <div class="h-4 w-px bg-gray-700 mx-2"></div>
            <button @click="confirmClear" class="nav-link text-red-500 hover:bg-red-500/10" title="Clear History">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Custom Toast -->
    <template x-teleport="body">
        <div x-show="notification.show" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-end="opacity-0 translate-y-4"
            :class="notification.type === 'success' ? 'toast-success' : 'toast-error'" class="cyber-toast">
            <span x-show="notification.type === 'success'">✅</span>
            <span x-show="notification.type === 'error'">❌</span>
            <span x-text="notification.message"></span>
        </div>
    </template>

    <!-- Cyber Modal -->
    <template x-teleport="body">
        <div x-show="modal.show" class="fixed inset-0 cyber-modal-overlay flex items-center justify-center p-4"
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
            x-transition:leave-end="opacity-0" style="display:none;">
            <div class="cyber-modal p-6 space-y-4" @click.away="modal.show = false">
                <div class="flex items-center gap-3 text-red-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                    <h3 class="font-bold text-lg" x-text="modal.title"></h3>
                </div>
                <p class="text-sm text-gray-400" x-text="modal.message"></p>
                <div class="flex justify-end gap-3 mt-6">
                    <button @click="modal.show = false" class="nav-link">Cancel</button>
                    <button @click="modal.onConfirm()"
                        class="px-4 py-2 bg-red-600/20 text-red-500 border border-red-500/50 rounded-lg text-sm font-bold hover:bg-red-600/40 transition">
                        Confirm Action
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Messages Area -->
    <div id="messages" style="flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem;">

        <!-- Welcome message -->
        <div x-show="messages.length === 0" style="text-align:center; margin:auto; padding:2rem;">
            <div style="font-size:3rem; margin-bottom:0.5rem;">⬡</div>
            <h2 style="color:#00ff41; font-size:1.25rem; font-weight:700; margin-bottom:0.5rem;">Mishri is ready
            </h2>
            <p style="color:#6b7280; font-size:0.875rem;">Ask anything. The agent will plan, research, and respond.
            </p>
            <div style="margin-top:1.5rem; display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center;">
                <template x-for="s in suggestions">
                    <button @click="sendSuggestion(s)"
                        style="background:#161b22; border:1px solid #30363d; border-radius:6px; padding:0.5rem 0.875rem; font-size:0.8rem; color:#9ca3af; cursor:pointer; font-family:inherit;"
                        onmouseover="this.style.borderColor='#00ff41';this.style.color='#00ff41'"
                        onmouseout="this.style.borderColor='#30363d';this.style.color='#9ca3af'" x-text="s">
                    </button>
                </template>
            </div>
        </div>

        <!-- Message list -->
        <template x-for="(msg, idx) in messages" :key="idx">
            <div :class="`msg-${msg.type} max-w-[85%]`" style="padding:1rem 1.25rem;">
                <!-- Header -->
                <div
                    style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:0.375rem;">
                    <span
                        style="font-size:0.7rem; font-weight:800; opacity:0.8; letter-spacing:0.1em; text-transform:uppercase;"
                        :style="msg.type==='user' ? 'color:#00ff41;' : msg.type==='assistant' ? 'color:#60a5fa;' : msg.type==='error' ? 'color:#ef4444;' : 'color:#f59e0b;'"
                        x-text="msg.type==='user' ? 'You' : msg.type==='assistant' ? 'Mishri' : msg.type==='error' ? 'Error' : 'Thinking'">
                    </span>
                    <span style="font-size:0.65rem; color:#6b7280;" x-text="msg.time"></span>
                </div>
                <!-- Content -->
                <div class="prose max-w-none" style="font-size:0.925rem; line-height:1.7; color:#d1d5db;"
                    x-html="msg.type==='assistant' ? renderMarkdown(msg.content) : escapeHtml(msg.content)">
                </div>
            </div>
        </template>

        <!-- Typing indicator -->
        <template x-if="thinking">
                <div class="flex justify-start">
                    <div class="msg-container msg-assist animate-pulse-neon">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-neon uppercase tracking-wider">Thinking</span>
                            <span class="flex gap-1">
                                <span class="w-1 h-1 bg-neon rounded-full animate-bounce" style="animation-delay: 0s"></span>
                                <span class="w-1 h-1 bg-neon rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                                <span class="w-1 h-1 bg-neon rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </template>

        <!-- Scroll anchor -->
        <div id="bottom"></div>
    </div>

    <div
        style="background:rgba(22, 27, 34, 0.8); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.1); padding:1.25rem 1.5rem; flex-shrink:0; box-shadow:0 -10px 30px rgba(0,0,0,0.3);">
        <div style="display:flex; gap:1rem; align-items:flex-end; max-width:56rem; margin:0 auto;">
            <textarea x-model="draft" @keydown.enter.prevent="handleEnter($event)" placeholder="Message Mishri..."
                :disabled="thinking || !wsReady" rows="1" class="cyber-input"
                style="flex:1; background:rgba(13, 17, 23, 0.7); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:0.75rem 1rem; color:#e2e8f0; font-family:inherit; font-size:0.95rem; resize:none; min-height:3rem; max-height:12rem; transition:all 0.2s; box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);"
                x-ref="textarea" @input="autoResize"></textarea>
            <button @click="sendMessage" :disabled="!draft.trim() || thinking || !wsReady" class="btn-send"
                style="height:3rem;">
                <span x-show="!thinking" style="display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </span>
                <span x-show="thinking" class="pulse">🧠</span>
            </button>
        </div>
        <p style="font-size:0.65rem; color:#4b5563; margin-top:0.625rem; text-align:center; letter-spacing:0.02em;">
            Mishri autonomous agent • Uses search, shell, and browser
        </p>
    </div>
    </div>

    <script>
        const md = markdownit({ html: false, linkify: true, typographer: true, breaks: true });

        function chatApp() {
            return {
                messages: [],
                draft: '',
                thinking: false,
                wsReady: false,
                ws: null,
                notification: { show: false, message: '', type: 'success' },
                modal: { show: false, title: '', message: '', onConfirm: () => { } },
                suggestions: [
                    'What can you do?',
                    'Search for the latest AI news',
                    'What is the current time and system info?',
                    'Write a hello world script in Python and run it',
                ],

                init() {
                    this.connectWS();
                },

                connectWS() {
                    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    this.ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);

                    this.ws.onopen = () => { this.wsReady = true; };
                    this.ws.onclose = () => {
                        this.wsReady = false;
                        this.thinking = false;
                        // Auto-reconnect after 3s
                        setTimeout(() => this.connectWS(), 3000);
                    };
                    this.ws.onerror = () => { this.wsReady = false; };

                    this.ws.onmessage = (evt) => {
                        const msg = JSON.parse(evt.data);
                        if (msg.type === 'thinking') {
                            this.thinking = true;
                            return;
                        }
                        this.thinking = false;
                        // Remove any lingering "thinking" placeholder messages
                        this.messages = this.messages.filter(m => m.type !== 'thinking');
                        this.messages.push({ type: msg.type, content: msg.content, time: this.now() });
                        this.$nextTick(() => this.scrollBottom());
                    };
                },

                sendMessage() {
                    const text = this.draft.trim();
                    if (!text || this.thinking || !this.wsReady) return;
                    this.messages.push({ type: 'user', content: text, time: this.now() });
                    this.ws.send(JSON.stringify({ type: 'user', content: text }));
                    this.draft = '';
                    this.$nextTick(() => {
                        this.$refs.textarea.style.height = 'auto';
                        this.scrollBottom();
                    });
                },

                sendSuggestion(text) {
                    this.draft = text;
                    this.sendMessage();
                },

                handleEnter(evt) {
                    if (evt.shiftKey) {
                        // Allow newline
                        this.draft += '\n';
                        this.$nextTick(() => this.autoResize());
                    } else {
                        this.sendMessage();
                    }
                },

                autoResize() {
                    const el = this.$refs.textarea;
                    el.style.height = 'auto';
                    el.style.height = Math.min(el.scrollHeight, 128) + 'px';
                },

                confirmClear() {
                    this.modal = {
                        show: true,
                        title: 'Clear Local Chat',
                        message: 'This will clear the current chat messages from your display. It will NOT affect the agent\'s permanent memory or plans.',
                        onConfirm: () => {
                            this.modal.show = false;
                            this.clearChat();
                        }
                    };
                },

                clearChat() {
                    this.messages = [];
                    this.flash('Local chat display cleared.', 'success');
                },

                flash(msg, type) {
                    this.notification = { show: true, message: msg, type };
                    setTimeout(() => this.notification.show = false, 3000);
                },

                scrollBottom() {
                    const el = document.getElementById('bottom');
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                },

                renderMarkdown(text) {
                    return md.render(text || '');
                },

                escapeHtml(text) {
                    return (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
                },

                now() {
                    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            };
        }
    </script>
</body>

</html>
